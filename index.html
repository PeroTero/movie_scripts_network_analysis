<header>

<div class="main-layout">
  <div class="graph-area">
    <div class="controls">
      <button class="cb active" data-mode="degree">STOPIEŃ</button>

</div>

<div id="tt">
  <div class="tn" id="ttn"></div>
  <div class="tm" id="ttm1"></div>
  <div class="tm" id="ttm2"></div>
  <div class="tm" id="ttm3"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
/* ===== GEXF DATA ===== */
const GEXF = `<?xml version="1.0" encoding="UTF-8"?>
<gexf version="1.2" xmlns="http://www.gexf.net/1.2draft" xmlns:viz="http:///www.gexf.net/1.1draft/viz">
  <meta/>
  <graph defaultedgetype="undirected">
    <attributes class="node">
      <attribute id="modularityClass" title="modularityClass" type="integer"/>
    </attributes>
    <nodes>
      <node id="EVAN" label="EVAN"><attvalues><attvalue for="modularityClass" value="0"/></attvalues></node>
      <node id="KAYLEIGH" label="KAYLEIGH"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="TOMMY" label="TOMMY"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="ANDREA" label="ANDREA"><attvalues><attvalue for="modularityClass" value="2"/></attvalues></node>
      <node id="LENNY" label="LENNY"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="DR. REDFIELD" label="DR. REDFIELD"><attvalues><attvalue for="modularityClass" value="2"/></attvalues></node>
      <node id="THUMPER" label="THUMPER"><attvalues><attvalue for="modularityClass" value="3"/></attvalues></node>
      <node id="MR. MILLER" label="MR. MILLER"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="CARLOS" label="CARLOS"><attvalues><attvalue for="modularityClass" value="0"/></attvalues></node>
      <node id="PROFESSOR CARTER" label="PROFESSOR CARTER"><attvalues><attvalue for="modularityClass" value="4"/></attvalues></node>
      <node id="HEIDI" label="HEIDI"><attvalues><attvalue for="modularityClass" value="3"/></attvalues></node>
      <node id="HUNTER" label="HUNTER"><attvalues><attvalue for="modularityClass" value="4"/></attvalues></node>
      <node id="JOURNAL ENTRY" label="JOURNAL ENTRY"><attvalues><attvalue for="modularityClass" value="0"/></attvalues></node>
      <node id="MRS. BOSWELL" label="MRS. BOSWELL"><attvalues><attvalue for="modularityClass" value="2"/></attvalues></node>
      <node id="EVAN'S DIARY" label="EVAN'S DIARY"><attvalues><attvalue for="modularityClass" value="3"/></attvalues></node>
      <node id="JASON" label="JASON"><attvalues><attvalue for="modularityClass" value="2"/></attvalues></node>
      <node id="MRS. KAGAN" label="MRS. KAGAN"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="SENIOR BROTHER" label="SENIOR BROTHER"><attvalues><attvalue for="modularityClass" value="4"/></attvalues></node>
      <node id="KARL" label="KARL"><attvalues><attvalue for="modularityClass" value="0"/></attvalues></node>
      <node id="TEEN PUNK" label="TEEN PUNK"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="KRISTEN" label="KRISTEN"><attvalues><attvalue for="modularityClass" value="3"/></attvalues></node>
      <node id="SPENCER" label="SPENCER"><attvalues><attvalue for="modularityClass" value="3"/></attvalues></node>
      <node id="MRS. HALPERN" label="MRS. HALPERN"><attvalues><attvalue for="modularityClass" value="1"/></attvalues></node>
      <node id="CONVICT" label="CONVICT"><attvalues><attvalue for="modularityClass" value="0"/></attvalues></node>
      <node id="KAYLEIGH'S MOTHER" label="KAYLEIGH'S MOTHER"><attvalues><attvalue for="modularityClass" value="2"/></attvalues></node>
    </nodes>
    <edges>
      <edge id="e0"  source="EVAN" target="KAYLEIGH" weight="25"/>
      <edge id="e1"  source="EVAN" target="TOMMY" weight="19"/>
      <edge id="e2"  source="EVAN" target="ANDREA" weight="15"/>
      <edge id="e3"  source="EVAN" target="LENNY" weight="14"/>
      <edge id="e4"  source="EVAN" target="THUMPER" weight="8"/>
      <edge id="e5"  source="EVAN" target="DR. REDFIELD" weight="6"/>
      <edge id="e6"  source="EVAN" target="MR. MILLER" weight="5"/>
      <edge id="e7"  source="EVAN" target="CARLOS" weight="4"/>
      <edge id="e8"  source="EVAN" target="PROFESSOR CARTER" weight="3"/>
      <edge id="e9"  source="EVAN" target="HEIDI" weight="3"/>
      <edge id="e10" source="EVAN" target="HUNTER" weight="3"/>
      <edge id="e11" source="EVAN" target="JOURNAL ENTRY" weight="3"/>
      <edge id="e12" source="EVAN" target="EVAN'S DIARY" weight="2"/>
      <edge id="e13" source="EVAN" target="JASON" weight="2"/>
      <edge id="e14" source="EVAN" target="MRS. KAGAN" weight="2"/>
      <edge id="e15" source="EVAN" target="SENIOR BROTHER" weight="2"/>
      <edge id="e16" source="EVAN" target="KARL" weight="2"/>
      <edge id="e17" source="KAYLEIGH" target="TOMMY" weight="11"/>
      <edge id="e18" source="KAYLEIGH" target="LENNY" weight="8"/>
      <edge id="e19" source="KAYLEIGH" target="MR. MILLER" weight="2"/>
      <edge id="e20" source="KAYLEIGH" target="ANDREA" weight="2"/>
      <edge id="e21" source="KAYLEIGH" target="HUNTER" weight="2"/>
      <edge id="e22" source="KAYLEIGH" target="SENIOR BROTHER" weight="2"/>
      <edge id="e23" source="TOMMY" target="LENNY" weight="8"/>
      <edge id="e24" source="TOMMY" target="MR. MILLER" weight="2"/>
      <edge id="e25" source="TOMMY" target="ANDREA" weight="2"/>
      <edge id="e26" source="ANDREA" target="DR. REDFIELD" weight="8"/>
      <edge id="e27" source="ANDREA" target="MRS. BOSWELL" weight="2"/>
      <edge id="e28" source="ANDREA" target="EVAN'S DIARY" weight="2"/>
      <edge id="e29" source="HUNTER" target="SENIOR BROTHER" weight="2"/>
    </edges>
  </graph>
</gexf>`;

/* ===== PARSE GEXF ===== */
function parseGEXF(str){
  const doc=(new DOMParser()).parseFromString(str,'application/xml');
  const nodes=[], edges=[];
  Array.from(doc.getElementsByTagName('node')).forEach(el=>{
    const id=el.getAttribute('id'), label=el.getAttribute('label')||id;
    let comm=0;
    Array.from(el.getElementsByTagName('attvalue')).forEach(av=>{
      if(av.getAttribute('for')==='modularityClass') comm=parseInt(av.getAttribute('value'));
    });
    nodes.push({id,label,community:comm});
  });
  Array.from(doc.getElementsByTagName('edge')).forEach(el=>{
    edges.push({
      source:el.getAttribute('source'),
      target:el.getAttribute('target'),
      weight:parseFloat(el.getAttribute('weight')||'1')
    });
  });
  return {nodes,edges};
}

const {nodes,edges}=parseGEXF(GEXF);
const N=nodes.length, E=edges.length;

/* ===== ADJACENCY ===== */
const adjList={}, adjSet={};
nodes.forEach(n=>{adjList[n.id]=[];adjSet[n.id]=new Set();});
edges.forEach(e=>{
  adjList[e.source].push({target:e.target,weight:e.weight});
  adjList[e.target].push({target:e.source,weight:e.weight});
  adjSet[e.source].add(e.target);
  adjSet[e.target].add(e.source);
});
const nodeMap={};
nodes.forEach(n=>nodeMap[n.id]=n);

/* ===== SNA METRICS ===== */

// 1. Weighted degree
function computeWeightedDegree(){
  const r={};
  nodes.forEach(n=>{r[n.id]=adjList[n.id].reduce((s,e)=>s+e.weight,0);});
  return r;
}

// 2. Betweenness (Brandes BFS)
function computeBetweenness(){
  const nids=nodes.map(n=>n.id);
  const idx={}; nids.forEach((id,i)=>idx[id]=i);
  const cb=new Array(N).fill(0);
  for(let si=0;si<N;si++){
    const S=[], P=Array.from({length:N},()=>[]);
    const sigma=new Array(N).fill(0), d=new Array(N).fill(-1);
    sigma[si]=1; d[si]=0;
    const Q=[si];
    while(Q.length){
      const vi=Q.shift(); S.push(vi);
      for(const {target:t} of (adjList[nids[vi]]||[])){
        const wi=idx[t];
        if(d[wi]<0){Q.push(wi);d[wi]=d[vi]+1;}
        if(d[wi]===d[vi]+1){sigma[wi]+=sigma[vi];P[wi].push(vi);}
      }
    }
    const delta=new Array(N).fill(0);
    while(S.length){
      const wi=S.pop();
      for(const vi of P[wi]) delta[vi]+=(sigma[vi]/sigma[wi])*(1+delta[wi]);
      if(wi!==si) cb[wi]+=delta[wi];
    }
  }
  const norm=(N-1)*(N-2)/2;
  const r={};
  nids.forEach((id,i)=>r[id]=norm>0?cb[i]/norm:0);
  return r;
}

// 3. Closeness (BFS, Wasserman-Faust for disconnected)
function computeCloseness(){
  const r={};
  nodes.forEach(src=>{
    const dist={[src.id]:0}; const Q=[src.id];
    while(Q.length){
      const v=Q.shift();
      for(const {target:t} of (adjList[v]||[])){
        if(dist[t]===undefined){dist[t]=dist[v]+1;Q.push(t);}
      }
    }
    const reach=Object.keys(dist).length;
    const total=Object.values(dist).reduce((a,b)=>a+b,0);
    r[src.id]=total>0?((reach-1)*(reach-1))/((N-1)*total):0;
  });
  return r;
}

// 4. PageRank
function computePageRank(d=0.85,iter=20){
  const nids=nodes.map(n=>n.id);
  let pr={}; nids.forEach(id=>pr[id]=1/N);
  for(let i=0;i<iter;i++){
    const np={}; nids.forEach(id=>np[id]=(1-d)/N);
    nids.forEach(id=>{
      const nb=adjList[id], k=nb.length;
      if(k===0){nids.forEach(nid=>np[nid]+=d*pr[id]/N);}
      else nb.forEach(({target:t})=>np[t]+=d*pr[id]/k);
    });
    pr=np;
  }
  return pr;
}

// 5. Local clustering coefficient
function computeClustering(){
  const r={};
  nodes.forEach(n=>{
    const nb=[...adjSet[n.id]], k=nb.length;
    if(k<2){r[n.id]=0;return;}
    let tri=0;
    for(let i=0;i<nb.length;i++)
      for(let j=i+1;j<nb.length;j++)
        if(adjSet[nb[i]]&&adjSet[nb[i]].has(nb[j])) tri++;
    r[n.id]=(2*tri)/(k*(k-1));
  });
  return r;
}

// 6. Greedy community detection (simplified modularity optimization)
function simpleGreedyComm(){
  const nids=nodes.map(n=>n.id);
  let M=0; nodes.forEach(n=>adjList[n.id].forEach(e=>M+=e.weight)); M/=2;
  if(M===0) return null;
  const kw={}; nodes.forEach(n=>kw[n.id]=adjList[n.id].reduce((s,e)=>s+e.weight,0));
  const comm={}; nids.forEach((id,i)=>comm[id]=i);
  let changed=true, maxIt=N*3, it=0;
  while(changed&&it<maxIt){
    changed=false; it++;
    let bestDQ=1e-9, bestPair=null;
    const seen=new Set();
    nids.forEach(id=>{
      adjList[id].forEach(({target:t})=>{
        if(comm[id]===comm[t]) return;
        const pk=[comm[id],comm[t]].sort().join('|');
        if(seen.has(pk)) return; seen.add(pk);
        const ci=comm[id], cj=comm[t];
        let eij=0; nids.forEach(u=>{if(comm[u]===ci) adjList[u].forEach(e=>{if(comm[e.target]===cj) eij+=e.weight;});});
        let Ki=0,Kj=0; nids.forEach(u=>{if(comm[u]===ci) Ki+=kw[u]; if(comm[u]===cj) Kj+=kw[u];});
        const dQ=eij/M-(Ki*Kj)/(2*M*M);
        if(dQ>bestDQ){bestDQ=dQ;bestPair=[ci,cj];}
      });
    });
    if(bestPair){
      const [ca,cb]=bestPair;
      nids.forEach(id=>{if(comm[id]===cb) comm[id]=ca;});
      changed=true;
    }
  }
  const uniq=[...new Set(Object.values(comm))];
  const remap={}; uniq.forEach((c,i)=>remap[c]=i);
  const res={}; nids.forEach(id=>res[id]=remap[comm[id]]);
  return res;
}

// 7. Bridges (Tarjan)
function findBridges(){
  const bridges=[], vis={}, disc={}, low={};
  let timer=0;
  function dfs(u,par){
    vis[u]=true; disc[u]=low[u]=timer++;
    for(const {target:v} of (adjList[u]||[])){
      if(!vis[v]){
        dfs(v,u); low[u]=Math.min(low[u],low[v]);
        if(low[v]>disc[u]) bridges.push([u,v]);
      } else if(v!==par) low[u]=Math.min(low[u],disc[v]);
    }
  }
  nodes.forEach(n=>{if(!vis[n.id]) dfs(n.id,null);});
  return bridges;
}

// 8. Network density
const density=(2*E)/(N*(N-1));

const clust=computeClustering();

nodes.forEach(n=>{

    closeness:clos[n.id]||0,

  };
});

/* ===== BRIDGE SET ===== */
const bridgeSet=new Set(bridges.map(([a,b])=>[a,b].sort().join('|||')));
function isBridge(e){
  const s=typeof e.source==='object'?e.source.id:e.source;
  const t=typeof e.target==='object'?e.target.id:e.target;
  return bridgeSet.has([s,t].sort().join('|||'));
}

// Auto-fit after simulation settles
setTimeout(()=>{
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  const pw=x1-x0, ph=y1-y0;
  if(pw<1||ph<1) return;
  const sc=Math.min((W-80)/pw,(H-80)/ph,2);
  const tx=W/2-sc*(x0+x1)/2, ty=H/2-sc*(y0+y1)/2;
  svg.transition().duration(1200).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
},2800);

/* ===== INTERACTIONS ===== */
function handleNodeClick(d){
  if(selectedNode===d.id){deselectAll();return;}
  selectedNode=d.id;
  const nb=new Set(adjSet[d.id]); nb.add(d.id);
  const connEdges=new Set();
  edges.forEach((e,i)=>{
    const s=e.source.id,t=e.target.id;
    if(s===d.id||t===d.id) connEdges.add(i);
  });
  nodeEl.attr('opacity',n=>nb.has(n.id)?1:0.06);
  nodeEl.filter(n=>n.id===d.id).attr('stroke','#fff').attr('stroke-width',2.5).attr('filter','url(#glow)');
  nodeEl.filter(n=>nb.has(n.id)&&n.id!==d.id).attr('stroke',n=>n.color).attr('stroke-width',1.5);
  linkEl.attr('opacity',(e,i)=>connEdges.has(i)?0.85:0.03);
  labelEl.attr('opacity',n=>nb.has(n.id)?1:0.06);
  showNodeCard(d);
}

function deselectAll(){
  selectedNode=null;
  nodeEl.attr('opacity',1).attr('stroke','none').attr('stroke-width',0).attr('filter',null);
  linkEl.attr('opacity',e=>0.18+(e.weight/maxW)*0.52);

}

/* ===== NODE CARD ===== */
function showNodeCard(d){
  const m=d.metrics, c=d.color;
  const conns=[...adjList[d.id]].sort((a,b)=>b.weight-a.weight).slice(0,5);
  const metricsFmt=[
    {lbl:'STOPIEŃ',val:m.degree,mx:maxM.degree,fmt:v=>v.toFixed(0)},
    {lbl:'POŚREDNICTWO',val:m.betweenness,mx:maxM.betweenness,fmt:v=>v.toFixed(3)},
    {lbl:'BLISKOŚĆ',val:m.closeness,mx:maxM.closeness,fmt:v=>v.toFixed(3)},
    {lbl:'PAGERANK',val:m.pagerank,mx:maxM.pagerank,fmt:v=>v.toFixed(4)},
    {lbl:'KLASTERYZACJA',val:m.clustering,mx:1,fmt:v=>v.toFixed(3)},
  ];
  const mHtml=metricsFmt.map(({lbl,val,mx,fmt})=>`
    <div class="mr">
      <div class="mhdr"><span class="mlbl">${lbl}</span><span class="mval">${fmt(val)}</span></div>
      <div class="bbg"><div class="bfill" style="width:${Math.min(100,(val/mx)*100)}%;background:${c}"></div></div>
    </div>`).join('');
  const cHtml=conns.map(({target,weight})=>{
    const tn=nodeMap[target]; const tc=tn?tn.color:'#8a8272';
    return `<div class="ci"><span><span class="cdot" style="background:${tc}"></span><span class="cname">${target}</span></span><span class="cw" style="color:${c}">${weight}</span></div>`;
  }).join('');
  document.getElementById('ncard').innerHTML=`
    <div class="nname">${d.label}</div>
    <div class="ctag" style="background:${c}20;color:${c};border:1px solid ${c}40">${CNAMES[d.community]||'–'}</div>
    ${mHtml}
    <div class="csec"><div class="ctitle">TOP POWIĄZANIA</div>${cHtml}</div>`;
}

/* ===== RANKING ===== */
function updateRanking(){
  const metric=currentRankMetric;
  let sorted=[...nodes];
  if(selectedComm!==null) sorted=sorted.filter(n=>n.community===selectedComm);
  sorted.sort((a,b)=>b.metrics[metric]-a.metrics[metric]);
  const top=sorted.slice(0,15);
  const mx=top.length?Math.max(...top.map(n=>n.metrics[metric])):1;
  const fmt=metric==='degree'?v=>v.toFixed(0):v=>v.toFixed(3);
  document.getElementById('rlist').innerHTML=top.map((n,i)=>`
    <div class="ri" data-id="${n.id}">
      <span class="rn">${i+1}</span>
      <span class="rdot" style="background:${n.color}"></span>
      <span class="rname">${n.label}</span>
      <div class="rbbg"><div class="rbfill" style="width:${mx>0?(n.metrics[metric]/mx*100):0}%;background:${n.color}"></div></div>
      <span class="rval">${fmt(n.metrics[metric])}</span>
    </div>`).join('');
  document.querySelectorAll('.ri').forEach(el=>{
    el.addEventListener('click',()=>{
      const nd=nodeMap[el.dataset.id];
      if(nd){handleNodeClick(nd);centerOnNode(nd);}
    });
  });
}

function centerOnNode(d){
  const sc=1.8;
  svg.transition().duration(750).call(zoom.transform,

}
